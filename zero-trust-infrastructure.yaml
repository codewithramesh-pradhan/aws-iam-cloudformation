AWSTemplateFormatVersion: '2010-09-09'
Description: 'Enterprise Zero-Trust Security Architecture with Multiple Defensive Layers'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
  
  OrganizationName:
    Type: String
    Default: YourOrganization
  
  EnableGuardDuty:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Resources:
  # Layer 1: Identity & Access Management
  ZeroTrustIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${OrganizationName}-ZeroTrust-ExecutionRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com, lambda.amazonaws.com]
            Action: sts:AssumeRole
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'true'
              DateGreaterThan:
                'aws:TokenIssueTime': !Sub '${AWS::Timestamp}'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAudit
      Policies:
        - PolicyName: ZeroTrustMinimalAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
              - Effect: Deny
                Action: '*'
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': 'false'

  # Layer 2: Network Security - VPC with Zero-Trust Networking
  ZeroTrustVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${OrganizationName}-ZeroTrust-VPC-${Environment}'
        - Key: SecurityLevel
          Value: Enterprise

  # Private Subnets for Zero-Trust Architecture
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ZeroTrustVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${OrganizationName}-Private-Subnet-1-${Environment}'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ZeroTrustVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${OrganizationName}-Private-Subnet-2-${Environment}'

  # Security Groups with Micro-segmentation
  ZeroTrustSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Zero-Trust Security Group with Micro-segmentation
      VpcId: !Ref ZeroTrustVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref WebTierSecurityGroup
          Description: HTTPS from Web Tier only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound only
      Tags:
        - Key: Name
          Value: !Sub '${OrganizationName}-ZeroTrust-SG-${Environment}'

  WebTierSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Web Tier Security Group
      VpcId: !Ref ZeroTrustVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
      Tags:
        - Key: Name
          Value: !Sub '${OrganizationName}-WebTier-SG-${Environment}'

  # Layer 3: Data Protection - KMS Key for Encryption
  ZeroTrustKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Zero-Trust Enterprise KMS Key for Data Encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow use of the key for encryption
            Effect: Allow
            Principal:
              AWS: !GetAtt ZeroTrustIAMRole.Arn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'true'

  ZeroTrustKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${OrganizationName}-zerotrust-${Environment}'
      TargetKeyId: !Ref ZeroTrustKMSKey

  # Layer 4: Application Security - Secrets Manager
  DatabaseCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${OrganizationName}/database/credentials/${Environment}'
      Description: Database credentials for Zero-Trust architecture
      KmsKeyId: !Ref ZeroTrustKMSKey
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  # Layer 5: Monitoring & Compliance - CloudTrail
  ZeroTrustCloudTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      TrailName: !Sub '${OrganizationName}-ZeroTrust-CloudTrail-${Environment}'
      S3BucketName: !Ref CloudTrailBucket
      S3KeyPrefix: cloudtrail-logs/
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true
      KMSKeyId: !Ref ZeroTrustKMSKey
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
          DataResources:
            - Type: AWS::S3::Object
              Values: ['arn:aws:s3:::*/*']

  CloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${OrganizationName}-zerotrust-cloudtrail-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref ZeroTrustKMSKey
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  # GuardDuty for Threat Detection
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Condition: EnableGuardDutyCondition
    Properties:
      Enable: true
      FindingPublishingFrequency: FIFTEEN_MINUTES

  # Security Hub for Centralized Security Findings
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${OrganizationName}-SecurityHub-${Environment}'

  # Config for Compliance Monitoring
  ConfigurationRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: !Sub '${OrganizationName}-Config-Recorder-${Environment}'
      RoleARN: !GetAtt ConfigRole.Arn
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true

  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/ConfigRole

  # Layer 6: Incident Response - Lambda for Automated Remediation
  SecurityRemediationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${OrganizationName}-SecurityRemediation-${Environment}'
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt ZeroTrustIAMRole.Arn
      KmsKeyArn: !GetAtt ZeroTrustKMSKey.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          
          def lambda_handler(event, context):
              # Automated security remediation logic
              print(f"Security event detected: {json.dumps(event)}")
              
              # Example: Disable compromised user
              if event.get('eventName') == 'ConsoleLogin' and event.get('errorCode'):
                  iam = boto3.client('iam')
                  username = event['userIdentity']['userName']
                  
                  # Attach deny-all policy for immediate isolation
                  iam.attach_user_policy(
                      UserName=username,
                      PolicyArn='arn:aws:iam::aws:policy/AWSDenyAll'
                  )
                  
              return {
                  'statusCode': 200,
                  'body': json.dumps('Security remediation completed')
              }

Conditions:
  EnableGuardDutyCondition: !Equals [!Ref EnableGuardDuty, 'true']

Outputs:
  VPCId:
    Description: Zero-Trust VPC ID
    Value: !Ref ZeroTrustVPC
    Export:
      Name: !Sub '${AWS::StackName}-VPC-ID'

  KMSKeyId:
    Description: Zero-Trust KMS Key ID
    Value: !Ref ZeroTrustKMSKey
    Export:
      Name: !Sub '${AWS::StackName}-KMS-Key-ID'

  SecurityGroupId:
    Description: Zero-Trust Security Group ID
    Value: !Ref ZeroTrustSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-Security-Group-ID'

  CloudTrailArn:
    Description: CloudTrail ARN for audit logging
    Value: !GetAtt ZeroTrustCloudTrail.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrail-ARN'
